# Global configuration for the Prometheus server
global:
  scrape_interval: 15s     # How often to fetch metrics from targets
  evaluation_interval: 15s # How often to evaluate alerting rules

# Scrape configurations define what resources Prometheus monitors
scrape_configs:
  # Monitoring the Prometheus server itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Monitoring the host machine via Node Exporter
  - job_name: 'node'
    static_configs:
      # Using the Docker bridge gateway IP to reach the host service
      - targets: ['172.17.0.1:9100']
